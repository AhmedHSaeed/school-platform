<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الدروس</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tahoma', sans-serif; }
        body { background: #f0f4f9; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { max-width: 950px; width: 100%; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a2b4c; }
        .subtitle { text-align: center; color: #777; margin-bottom: 30px; border-bottom: 2px solid #eef2f7; padding-bottom: 15px; }
        .loading { text-align: center; padding: 40px; color: #888; font-size: 18px; }
        .error { text-align: center; padding: 40px; color: #d32f2f; font-size: 18px; }
        .empty { text-align: center; padding: 40px; color: #888; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #1a2b4c; color: white; padding: 12px; text-align: center; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        .download-btn { 
            background: #2a9d8f; color: white; padding: 6px 20px; border-radius: 30px; 
            text-decoration: none; display: inline-block; font-weight: bold;
        }
        .download-btn:hover { background: #21867a; }
        .footer { text-align: center; margin-top: 30px; color: #aaa; font-size: 14px; }
        .home-options { display: flex; flex-direction: column; gap: 15px; margin: 30px 0; }
        .home-btn {
            display: block; text-align: center; padding: 20px; border-radius: 16px;
            text-decoration: none; font-size: 22px; font-weight: bold; transition: 0.3s;
            border: 2px solid transparent; cursor: pointer; width: 100%;
        }
        .home-btn.days { background: #e3f2fd; color: #0d47a1; border-color: #90caf9; }
        .home-btn.subjects { background: #fff3e0; color: #bf360c; border-color: #ffcc80; }
        .home-btn.extra { background: #f3e5f5; color: #4a148c; border-color: #ce93d8; }
        .home-btn:hover { transform: scale(1.02); }
        .nav-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        .back-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: #555; padding: 5px 10px; border-radius: 8px; }
        .back-btn:hover { background: #f0f0f0; }
        .hidden { display: none; }
        .filter-area { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .week-chip {
            padding: 8px 20px; border-radius: 30px; border: 2px solid #e76f51;
            background: white; color: #e76f51; font-weight: bold; cursor: pointer;
            transition: 0.3s; font-size: 15px;
        }
        .week-chip.active, .week-chip:hover { background: #e76f51; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 منصة الدروس التعليمية</h1>
    <p class="subtitle">اختر طريقة العرض المناسبة لك</p>

    <!-- الصفحة الرئيسية -->
    <div id="homePage">
        <div class="home-options">
            <button class="home-btn days" onclick="showDaily()">📅 الدروس حسب الأيام</button>
            <button class="home-btn subjects" onclick="showWeekly()">📘 الدروس حسب المواد</button>
            <button class="home-btn extra" onclick="showExtra()">📎 مصادر جانبية</button>
        </div>
    </div>

    <!-- صفحة الأيام -->
    <div id="dailyPage" class="hidden">
        <div class="nav-bar">
            <button class="back-btn" onclick="goHome()">➜</button>
            <span class="nav-title" style="font-size:20px;font-weight:bold;color:#1a2b4c;flex:1;">📅 الدروس حسب الأيام</span>
        </div>
        <div id="dailyContainer"><p class="loading">⏳ جاري التحميل...</p></div>
    </div>

    <!-- صفحة المواد -->
    <div id="weeklyPage" class="hidden">
        <div class="nav-bar">
            <button class="back-btn" onclick="goHome()">➜</button>
            <span class="nav-title" style="font-size:20px;font-weight:bold;color:#1a2b4c;flex:1;">📘 الدروس حسب المواد</span>
        </div>
        <div id="filterArea"></div>
        <div id="weeklyContainer"><p class="loading">⏳ جاري التحميل...</p></div>
    </div>

    <!-- صفحة المصادر -->
    <div id="extraPage" class="hidden">
        <div class="nav-bar">
            <button class="back-btn" onclick="goHome()">➜</button>
            <span class="nav-title" style="font-size:20px;font-weight:bold;color:#1a2b4c;flex:1;">📎 مصادر جانبية</span>
        </div>
        <div id="extraContainer"><p class="loading">⏳ جاري التحميل...</p></div>
    </div>

    <div class="footer">© 2026 - يتم التحديث تلقائياً عبر جوجل شيت</div>
</div>

<script>
    // ========================================
    // 🟢 ضع هنا ID جدول جوجل شيت الخاص بك
    const SHEET_ID = '180ooJ1sFA21lV7-RSpb5C5abtQulbPo2m9Z7My_-QAY';
    // ========================================

    // دالة لجلب البيانات من ورقة معينة باستخدام طريقة مختلفة وآمنة
    async function getSheetData(sheetName) {
        try {
            // استخدام Google Sheets API بطريقة مبسطة
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
            const response = await fetch(url);
            const text = await response.text();
            
            // تحويل CSV إلى صفوف
            const rows = text.split('\n').filter(row => row.trim() !== '');
            const result = [];
            
            // نبدأ من الصف الأول (العناوين) ونمرره، ثم نقرأ البيانات من الصف الثاني
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(',').map(col => col.trim().replace(/^"|"$/g, ''));
                if (cols.length >= 3) {
                    result.push({
                        col1: cols[0] || '',
                        col2: cols[1] || '',
                        col3: cols[2] || ''
                    });
                }
            }
            return result;
        } catch (error) {
            console.error('خطأ في جلب البيانات:', error);
            return null;
        }
    }

    // عرض الجدول في الصفحة
    function renderData(data, containerId, col1Name, col2Name) {
        const container = document.getElementById(containerId);
        if (!data) {
            container.innerHTML = '<p class="error">❌ حدث خطأ في جلب البيانات. تأكد من أن الجدول عام.</p>';
            return;
        }
        if (data.length === 0) {
            container.innerHTML = '<p class="empty">📭 لا توجد بيانات مضافة حالياً</p>';
            return;
        }

        let html = `<div class="table-wrapper"><table>
            <thead><tr><th>${col1Name}</th><th>${col2Name}</th><th>التحميل</th></tr></thead><tbody>`;
        
        data.forEach(row => {
            html += `<tr>
                <td>${row.col1}</td>
                <td>${row.col2}</td>
                <td><a href="${row.col3}" class="download-btn" target="_blank">📥 تحميل</a></td>
            </tr>`;
        });
        
        html += '</tbody></table></div>';
        container.innerHTML = html;
    }

    // ===== عرض الدروس حسب الأيام =====
    let dailyData = [];
    async function showDaily() {
        document.getElementById('homePage').classList.add('hidden');
        document.getElementById('dailyPage').classList.remove('hidden');
        document.getElementById('weeklyPage').classList.add('hidden');
        document.getElementById('extraPage').classList.add('hidden');
        
        document.getElementById('dailyContainer').innerHTML = '<p class="loading">⏳ جاري التحميل...</p>';
        const data = await getSheetData('Daily');
        if (data) dailyData = data;
        renderData(dailyData, 'dailyContainer', 'التاريخ', 'المادة');
    }

    // ===== عرض الدروس حسب المواد =====
    let weeklyData = [];
    async function showWeekly() {
        document.getElementById('homePage').classList.add('hidden');
        document.getElementById('dailyPage').classList.add('hidden');
        document.getElementById('weeklyPage').classList.remove('hidden');
        document.getElementById('extraPage').classList.add('hidden');
        
        document.getElementById('weeklyContainer').innerHTML = '<p class="loading">⏳ جاري التحميل...</p>';
        const data = await getSheetData('Weekly');
        if (data) weeklyData = data;
        
        // استخراج الأسابيع الفريدة
        const weeks = [...new Set(weeklyData.map(row => row.col1))].filter(w => w !== '');
        const filterDiv = document.getElementById('filterArea');
        
        if (weeks.length === 0) {
            filterDiv.innerHTML = '';
            document.getElementById('weeklyContainer').innerHTML = '<p class="empty">📭 لا توجد مواد مضافة</p>';
            return;
        }

        let filterHtml = '<div class="filter-area">';
        weeks.forEach(week => {
            filterHtml += `<button class="week-chip" onclick="filterWeek('${week}')">📌 الأسبوع ${week}</button>`;
        });
        filterHtml += '</div>';
        filterDiv.innerHTML = filterHtml;
        
        // عرض الأسبوع الأول افتراضياً
        if (weeks.length > 0) filterWeek(weeks[0]);
    }

    function filterWeek(week) {
        // تحديث حالة الأزرار
        document.querySelectorAll('.week-chip').forEach(btn => {
            btn.classList.remove('active');
            if (btn.textContent.includes(week)) btn.classList.add('active');
        });
        
        const filtered = weeklyData.filter(row => row.col1 === week);
        renderData(filtered, 'weeklyContainer', 'المادة', 'الملخص');
    }

    // ===== عرض المصادر الجانبية =====
    let extraData = [];
    async function showExtra() {
        document.getElementById('homePage').classList.add('hidden');
        document.getElementById('dailyPage').classList.add('hidden');
        document.getElementById('weeklyPage').classList.add('hidden');
        document.getElementById('extraPage').classList.remove('hidden');
        
        document.getElementById('extraContainer').innerHTML = '<p class="loading">⏳ جاري التحميل...</p>';
        const data = await getSheetData('Extra');
        if (data) extraData = data;
        renderData(extraData, 'extraContainer', 'العنوان', 'النوع / الوصف');
    }

    function goHome() {
        document.getElementById('homePage').classList.remove('hidden');
        document.getElementById('dailyPage').classList.add('hidden');
        document.getElementById('weeklyPage').classList.add('hidden');
        document.getElementById('extraPage').classList.add('hidden');
    }

    // تحميل البيانات بشكل مسبق
    async function preloadData() {
        const d = await getSheetData('Daily');
        if (d) dailyData = d;
        const w = await getSheetData('Weekly');
        if (w) weeklyData = w;
        const e = await getSheetData('Extra');
        if (e) extraData = e;
    }
    preloadData();
</script>
</body>
</html>
